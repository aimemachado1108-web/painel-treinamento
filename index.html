<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinamento Suporte — Desenvolvimento &amp; Impacto</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236d5de0'/><text y='.9em' font-size='70' x='12'>★</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ===== themes (light: claro / lilas / roxo · dark) ===== */
:root{
  --bg:#f5f4fb; --surface:#fff; --sidebar:#fbfaff;
  --border:#e9e7f3; --border-2:#dcd9ec;
  --text:#1f2030; --text-2:#6b6a7e; --text-3:#a09eb2;
  --purple:#6d5de0; --purple-2:#8b7df0; --purple-dark:#5848c4; --purple-soft:#efecfd;
  --blue:#3b82f6; --blue-soft:#e0ecfd; --blue-text:#1d4ed8;
  --teal:#14b8a6; --teal-soft:#d2f6ef; --teal-text:#0f766e;
  --pink:#ec4899; --pink-soft:#fce4ef; --pink-text:#be185d;
  --amber:#f59e0b; --amber-soft:#fdf0d3; --amber-text:#a8620a;
  --green:#22c55e; --green-soft:#dcf6e4; --green-text:#15803d;
  --red:#ef4444; --red-soft:#fde4e4; --red-text:#b91c1c;
  --slate-soft:#eef1f6; --slate-text:#5b6472;
  --card-done:#f1faf3; --card-done-bd:#d2eddb;
  --track:#f1eff8; --bar-alt:#cfc7f3; --input-bg:#fafbff; --hover:#f1eefb; --count-bg:#ece9f8;
  --gold:#f5a623;
  --font-body:'Plus Jakarta Sans','Inter',-apple-system,sans-serif;
  --font-title:'DM Serif Display',Georgia,serif;
  --fs:14px;
  --radius:12px; --radius-sm:9px;
  --shadow:0 1px 2px rgba(40,30,80,.05);
}
body[data-theme="lilas"]{
  --bg:#f7f1fc; --surface:#fff; --sidebar:#fcf7ff;
  --border:#efe3f8; --border-2:#e0cff1;
  --purple:#8b5cf6; --purple-2:#a78bfa; --purple-dark:#6d28d9; --purple-soft:#f1e7fe;
  --track:#f3ebfb; --bar-alt:#d6c4f5; --hover:#f3eafd; --count-bg:#eee0fb; --input-bg:#fcf9ff;
}
body[data-theme="roxo"]{
  --bg:#efe9fb; --surface:#fff; --sidebar:#f4eefc;
  --border:#e4d9f5; --border-2:#cfbdee;
  --purple:#6d28d9; --purple-2:#8b5cf6; --purple-dark:#5b21b6; --purple-soft:#e9dcfb;
  --text:#241a3a; --text-2:#5e5474;
  --track:#ece2f8; --bar-alt:#c9b6ee; --hover:#ece2f8; --count-bg:#e3d4f7; --input-bg:#faf7fe;
}
body[data-theme="dark"]{
  --bg:#0d0b14; --surface:#13101f; --sidebar:#100e1a;
  --border:#2a2340; --border-2:#352b4a;
  --text:#ece9f5; --text-2:#a9a4bd; --text-3:#787390;
  --purple:#8b7df0; --purple-2:#a99cf7; --purple-dark:#c4bcff; --purple-soft:#2e2845;
  --blue:#60a5fa; --blue-soft:#1e2c47; --blue-text:#93bcf6;
  --teal:#2dd4bf; --teal-soft:#14322d; --teal-text:#5fd3bb;
  --pink:#f472b6; --pink-soft:#3a1f2d; --pink-text:#f0a0c4;
  --amber:#fbbf24; --amber-soft:#3a2c12; --amber-text:#f1c468;
  --green:#4ade80; --green-soft:#16331f; --green-text:#76db9c;
  --red:#f87171; --red-soft:#3a1e1e; --red-text:#f29a9a;
  --slate-soft:#2a2738; --slate-text:#b6b1cb;
  --card-done:#172a1d; --card-done-bd:#2c4a37;
  --track:#2a2640; --bar-alt:#4a4170; --input-bg:#262236; --hover:#2a2640; --count-bg:#342e4c;
  --gold:#fbbf24;
  --shadow:0 1px 2px rgba(0,0,0,.3);
}
body[data-theme="dark"] input,body[data-theme="dark"] select,body[data-theme="dark"] textarea{background:var(--input-bg);color:var(--text);border-color:var(--border-2);}
body[data-theme="dark"] .modal{background:#1e1a2d;}
body[data-theme="dark"] .statussel{color:var(--text);}
body[data-theme="dark"] .mcard{background:var(--surface);}
body[data-theme="dark"] .acard{background:var(--surface);}
body[data-theme="dark"] .acard.done{background:var(--card-done);}
body[data-theme="dark"] .folder{background:var(--surface);border-color:var(--border);}
body[data-theme="dark"] .folder.neutral{background:var(--surface);}
body[data-theme="dark"] code{background:var(--track);color:var(--text-2);}
body[data-theme="dark"] .orgcol{background:var(--surface);}
body[data-theme="dark"] .orgm{background:var(--input-bg);}
body[data-theme="dark"] .prio button{background:var(--surface);color:var(--text);}
body[data-theme="dark"] .seg button{background:var(--surface);color:var(--text);}
body[data-theme="dark"] .btn{background:var(--surface);color:var(--text);}
body[data-theme="dark"] .btn.primary{background:var(--purple);color:#fff;}
body[data-theme="dark"] .selpill{background:var(--surface);color:var(--text);}
body[data-theme="dark"] .filters .ft{background:var(--surface);color:var(--text-2);}
body[data-theme="dark"] .metcell{background:var(--input-bg);}
body[data-theme="dark"] .caixa{background:var(--input-bg);}
body[data-theme="dark"] .donut .hole{background:var(--surface);}
body[data-theme="dark"] .msum .c{background:var(--surface);}
body[data-theme="dark"] select option{background:#211d2e;color:#ece9f5;}
body[data-fs="sm"]{--fs:13px} body[data-fs="md"]{--fs:14px} body[data-fs="lg"]{--fs:15px} body[data-fs="xl"]{--fs:16.5px}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:var(--fs);-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
.tfont{font-family:var(--font-title)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:.95em;color:var(--text)}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:8px}
code{background:var(--track);padding:1px 5px;border-radius:5px;font-size:.85em}

.app{display:flex;min-height:100vh}
.sidebar{width:212px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);padding:18px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.brand{display:block;padding:4px}
.brand .badge-wrap{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--purple-2),var(--purple-dark));border-radius:12px;padding:10px 12px;box-shadow:0 4px 12px rgba(109,93,224,.25)}
.brand .star{font-size:13px;margin-right:4px;opacity:.9}
.brand .brand-text{flex:1;min-width:0}
.brand .name{font-family:var(--font-title);font-style:italic;font-weight:400;font-size:13.5px;color:#fff;line-height:1.25;white-space:normal;word-break:break-word}
.brand .sub{font-size:9px;color:rgba(255,255,255,.55);margin-top:3px;white-space:normal;word-break:break-word;font-weight:400;letter-spacing:.02em}
.navgroup{margin-top:18px}
.navgroup .label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);font-weight:600;padding:0 8px 6px}
.navitem{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;color:var(--text-2);padding:8px 10px;border-radius:9px;font-size:.96em;font-weight:500;margin-bottom:2px;font-family:inherit}
.navitem:hover{background:var(--hover);color:var(--text)}
.navitem.active{background:var(--purple-soft);color:var(--purple-dark)}
.navitem .ic{width:16px;text-align:center;opacity:.85}
.navitem .ct{margin-left:auto;background:var(--count-bg);color:var(--purple-dark);font-size:10.5px;font-weight:600;border-radius:20px;padding:1px 7px;min-width:20px;text-align:center}
.navitem.active .ct{background:var(--surface)}
.sidefoot{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:14px;border-top:1px solid var(--border);cursor:pointer;border-radius:9px}
.sidefoot:hover{background:var(--hover)}
.sidefoot .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple-2),var(--purple-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.sidefoot .cog{margin-left:auto;color:var(--text-3);font-size:15px}

.main{flex:1;width:0;min-width:0;display:flex;flex-direction:column;overflow-x:hidden}
.topbar{display:flex;align-items:flex-start;gap:14px;padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:30;flex-wrap:wrap}
.topbar .tt{font-size:.95em;font-weight:600}
.topbar .dt{font-size:.8em;color:var(--text-3);margin-top:1px}
.topbar .actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.content{padding:24px 28px 60px;width:100%;box-sizing:border-box}

.btn{border:1px solid var(--border-2);background:var(--surface);color:var(--text);border-radius:9px;padding:7px 12px;font-size:.86em;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:.12s;font-family:inherit}
.btn:hover{background:var(--hover);border-color:var(--purple-2)}
.btn.primary{background:var(--purple);border-color:var(--purple);color:#fff}
.btn.primary:hover{background:var(--purple-dark)}
.btn.sm{padding:5px 9px;font-size:.82em}
.btn.icon{padding:6px 9px}
.selpill{border:1px solid var(--border-2);background:var(--surface);border-radius:9px;padding:6px 10px;font-size:.86em;font-weight:500;color:var(--text)}

.page-h{margin-bottom:20px}
.page-h h1{font-family:var(--font-title);font-weight:600;font-size:2.1em;letter-spacing:-.5px}
.page-h p{color:var(--text-2);font-size:.96em;margin-top:4px}

.mcards{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:22px}
@media(max-width:1200px){.mcards{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.mcards{grid-template-columns:repeat(2,1fr)}}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:118px}
.mcard .lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);font-weight:600;line-height:1.3;padding-right:14px;min-height:28px;display:flex;align-items:flex-start}
.mcard .lbl-ic{position:absolute;top:14px;right:14px;color:var(--text-3);font-size:13px}
.mcard .val{font-family:'Inter',var(--font-body);font-size:2.2em;font-weight:700;margin-top:6px;letter-spacing:-.5px;line-height:1;height:44px;display:flex;align-items:center}
.mcard .foot{font-size:.82em;color:var(--text-3);margin-top:auto;padding-top:6px}
.mcard .tag{display:inline-block;font-size:10.5px;font-weight:600;border-radius:20px;padding:1px 8px;margin-top:auto;white-space:nowrap}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);margin-bottom:18px}
.panel-h{display:flex;align-items:center;gap:9px;margin-bottom:16px}
.panel-h .pi{width:26px;height:26px;border-radius:8px;background:var(--purple-soft);color:var(--purple-dark);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.panel-h h2{font-size:1.14em;font-weight:600}
.grid2{display:grid;grid-template-columns:1.55fr 1fr;gap:18px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}

.barrow{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.barrow .nm{font-size:.9em;color:var(--text-2);width:160px;text-align:right;flex-shrink:0}
.barrow .track{flex:1;height:18px;background:var(--track);border-radius:7px;overflow:hidden}
.barrow .fill{height:100%;border-radius:7px;transition:width .5s}
.barrow .vl{font-size:.9em;font-weight:600;width:46px}

.donut-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:230px}
.donut{position:relative;width:170px;height:170px;border-radius:50%}
.donut .hole{position:absolute;inset:26px;background:var(--surface);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut .hole b{font-family:'Inter',var(--font-body);font-size:1.9em;font-weight:700}
.donut .hole span{font-size:.78em;color:var(--text-3)}
.legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;font-size:.85em;color:var(--text-2)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block}

.mbars{display:flex;gap:30px;justify-content:center;align-items:flex-end;height:150px;padding-top:12px}
.mbg{display:flex;flex-direction:column;align-items:center;gap:6px}
.mbg .pair{display:flex;align-items:flex-end;gap:5px;height:120px}
.mbg .b{width:26px;border-radius:5px 5px 0 0;display:flex;justify-content:center;align-items:flex-start;padding-top:3px;font-size:10px;color:var(--purple-dark);font-weight:600;background:var(--purple-2)}
.mbg .b.alt{background:var(--bar-alt)}
.mbg .cap{font-size:.82em;color:var(--text-2)}

.msum{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.msum .c{border:1px solid var(--border);border-radius:var(--radius);padding:15px 17px;background:var(--surface)}
.msum .c.cur{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-soft)}
.msum .c h3{font-family:var(--font-title);font-size:1.28em;font-weight:600}
.msum .c p{font-size:.85em;color:var(--text-2);margin:6px 0}
.msum .c .st{font-size:.82em;color:var(--text-3)}

.folders{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.folder{border:1px solid var(--card-done-bd);border-top:3px solid var(--green);border-radius:var(--radius);padding:16px 18px;background:var(--card-done);cursor:pointer;transition:.15s}
.folder.neutral{background:var(--surface);border-color:var(--border);border-top-color:var(--purple)}
.folder:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(40,30,80,.07)}
.folder .ico{font-size:24px;margin-bottom:8px}
.folder h3{font-size:1.05em;font-weight:600}
.folder .meta{font-size:.85em;color:var(--text-2);margin-top:2px}
.folder .chip{display:inline-block;margin-top:9px;font-size:.78em;font-weight:600;color:var(--green-text);background:var(--surface);border:1px solid var(--card-done-bd);border-radius:20px;padding:2px 9px}

.metgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:6px}
.metcell{background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.metcell .k{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);font-weight:600}
.metcell .v{font-family:'Inter',var(--font-body);font-size:1.1em;font-weight:600;margin-top:6px}
.metcell .v b{font-weight:700}.metcell .v .ar{color:var(--text-3);margin:0 4px}
.delta{display:inline-block;margin-top:7px;font-size:.78em;font-weight:600;border-radius:6px;padding:1px 7px}
.delta.up{background:var(--green-soft);color:var(--green-text)}
.delta.down{background:var(--red-soft);color:var(--red-text)}

.formrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:6px}
.fld label{display:block;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);font-weight:600;margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;border:1px solid var(--border-2);border-radius:9px;padding:9px 11px;background:var(--input-bg)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--purple-2);box-shadow:0 0 0 3px var(--purple-soft);background:var(--surface)}

.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filters .ft{border:1px solid var(--border-2);background:var(--surface);border-radius:8px;padding:6px 13px;font-size:.86em;color:var(--text-2);font-weight:500}
.filters .ft.on{background:var(--purple-soft);border-color:var(--purple-2);color:var(--purple-dark)}
.acards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:800px){.acards-grid{grid-template-columns:1fr}}
.acard{position:relative;background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--red);border-radius:var(--radius);padding:16px 18px 14px 18px}
.acard.done{background:var(--card-done);border-color:var(--card-done-bd)}
.acard .top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.acard .top-left{flex:1;min-width:0}
.acard h3{font-size:1em;font-weight:600;line-height:1.3}
.acard .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;align-items:center}
.acard .dates{font-size:.8em;color:var(--text-2);margin-top:7px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.acard .timer{display:inline-flex;align-items:center;gap:4px;font-size:.8em;font-weight:600;color:var(--purple-dark);margin-top:5px}
.acard .desc{font-size:.88em;color:var(--text-2);margin-top:8px;line-height:1.5;border-top:1px solid var(--border);padding-top:8px}
.acard .rt{display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.acard .x{border:1px solid var(--border-2);background:var(--surface);border-radius:8px;width:28px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:.85em}
body:not(.editmode) .acard .x{display:none!important}
body:not(.editmode) .orgx{display:none!important}
body:not(.editmode) [onclick*="delTeam"]{display:none!important}
body:not(.editmode) [onclick*="delPdiGroup"]{display:none!important}
.acard .x:hover{color:var(--red);border-color:var(--red)}

.badge{font-size:.78em;font-weight:600;border-radius:7px;padding:3px 9px;white-space:nowrap}
.statussel{border-radius:8px;padding:5px 8px;font-size:.8em;font-weight:600;border:1px solid transparent}

.tbl{width:100%;border-collapse:collapse;font-size:.88em}
.tbl th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--border)}
.tbl td{padding:13px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl .pos{color:var(--green-text);font-weight:600}.tbl .neg{color:var(--red-text);font-weight:600}
.wrap-x{overflow-x:auto}

.impa{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.impa .av{width:32px;height:32px;border-radius:50%;background:var(--purple-soft);color:var(--purple-dark);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.impa .nm{font-size:.9em;font-weight:500;width:130px;flex-shrink:0}
.impa .track{flex:1;height:9px;background:var(--track);border-radius:6px;overflow:hidden}
.impa .fill{height:100%;background:var(--green);border-radius:6px}
.impa .vl{font-size:.88em;font-weight:600;width:78px;text-align:right}

.caixa{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:12px;background:var(--input-bg)}
.caixa.worst{border-color:var(--red);background:var(--red-soft)}
.caixa .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.caixa .ch b{font-size:1em}
.caixa .nums{font-size:.86em;color:var(--text-2)}
.warnchip{font-size:10.5px;font-weight:700;color:var(--red-text);background:var(--surface);border:1px solid var(--red);border-radius:20px;padding:2px 9px;margin-left:8px}
.ratebar{height:8px;background:var(--green-soft);border-radius:6px;overflow:hidden}
.ratebar .er{height:100%;background:var(--red);border-radius:6px}

.starrow{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.starrow .nm{width:150px;font-size:.9em;flex-shrink:0}
.starrow .stars{color:var(--gold);font-size:1.05em;letter-spacing:1px;width:96px}
.starrow .track{flex:1;height:9px;background:var(--track);border-radius:6px;overflow:hidden}
.starrow .fill{height:100%;background:var(--gold);border-radius:6px}

<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="badge-wrap">
        <div class="brand-text">
          <div class="name"><span class="star">★</span> Treinamento Suporte</div>
          <div class="sub">Desenvolvimento &amp; Impacto B2B</div>
        </div>
      </div>
    </div>

    <div class="sidefoot"><div class="av" onclick="openSettings()" style="cursor:pointer">A</div><div onclick="openSettings()" style="cursor:pointer;flex:1"><div style="font-size:.86em;font-weight:600">Aimê</div><div style="font-size:.74em;color:var(--text-3)">Treinamento Suporte</div></div><button class="lock-btn" id="lockBtn" onclick="toggleEditMode()" title="Modo edição"></button><span class="cog" onclick="openSettings()" style="cursor:pointer">⚙</span></div>
  </aside>

    <header class="topbar">
      <div><div class="tt" id="tb-title">Visão Geral</div><div class="dt" id="tb-date"></div></div>
      <div class="actions">
        <span id="sync-badge" style="font-size:.78em;padding:4px 8px"></span>
        <button class="btn sm" id="btn-pull" title="Buscar dados atualizados" onclick="pullFromFirebase().then(ok=>toast(ok?'✓ Atualizado!':'Sem dados novos'))">↻ Atualizar</button>
        <select class="selpill" id="monthSel"></select>
        <button class="btn icon edit-only" title="Novo mês" onclick="addMonth()">+</button>
        <button class="btn" onclick="exportCSV()">↓ CSV</button><button class="btn" onclick="window.print()" title="Exportar como PDF">🖨 PDF</button>
      </div>
    </header>
    <main class="content" id="content" style="width:100%;box-sizing:border-box"></main>
  </div>
</div>
<div class="overlay" id="overlay"></div>
<div class="toast" id="toast"></div>

<script>
/* ===== Firebase Realtime Database sync ===== */
const KEY='painel_treino_suporte_v2';
const KEY_PREFS='painel_prefs_local'; // aparência — só local, não sincroniza
const FB_BASE='https://painel-aime-default-rtdb.firebaseio.com/painel';
const FB_URL=FB_BASE+'.json';
let mem=null;
let syncTimer=null;
let syncStatus='ok';
let lastSyncTime=null;
let _syncing=false;

function loadPrefs(){try{const r=localStorage.getItem(KEY_PREFS);if(r)return JSON.parse(r);}catch(e){}return null;}
function savePrefs(){try{localStorage.setItem(KEY_PREFS,JSON.stringify(db.settings));}catch(e){}}
function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return mem?JSON.parse(JSON.stringify(mem)):null;}

function persist(skipRender){
  _lastEdit=Date.now();
  try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){mem=JSON.parse(JSON.stringify(db));}
  savePrefs();
  if(!skipRender)render();
  if(syncTimer)clearTimeout(syncTimer);
  syncTimer=setTimeout(sendToFirebase,1500);
  updateSyncBadge();
}

async function sendToFirebase(){
  if(_syncing)return;
  _syncing=true;
  syncStatus='syncing';updateSyncBadge();
  const fields=['pdis','actions','docs','macros','roster','months','caixas','current','onboardingFeedbacks','onboardingBimestre'];
  let allOk=true;
  // Envia campo por campo
  for(const f of fields){
    const v=db[f];
    if(v===undefined||v===null)continue;
    try{
      const r=await fetch(`${FB_BASE}/${f}.json`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(v)
      });
      if(!r.ok)allOk=false;
    }catch(e){allOk=false;}
  }
  // teamTrainings separado — converte answers para array
  try{
    const tt=(db.teamTrainings||[]).map(t=>({
      id:t.id||'',title:t.title||'',date:t.date||'',
      month:t.month||'',status:t.status||'',errMode:t.errMode||'',
      caixas:t.caixas||[],questions:t.questions||[],
      results:(t.results||[]).map(r=>({
        analista:r.analista||'',email:r.email||'',caixa:r.caixa||'',
        stars:r.stars||0,ac:r.ac||0,er:r.er||0,feedback:r.feedback||'',
        answersArr:(t.questions||[]).map(q=>r.answers?!!r.answers[q]:null)
      }))
    }));
    const r=await fetch(`${FB_BASE}/teamTrainings.json`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(tt)
    });
    if(!r.ok)allOk=false;
  }catch(e){allOk=false;}
  if(allOk){
    syncStatus='ok';lastSyncTime=new Date();
  } else {
    syncStatus='error';
    // Tenta de novo em 5s
    setTimeout(sendToFirebase,5000);
  }
  _syncing=false;
  updateSyncBadge();
}

async function pullFromFirebase(){
  if(_syncing)return false;
  syncStatus='syncing';updateSyncBadge();
  try{
    const r=await fetch(FB_URL+'?t='+Date.now());
    if(!r.ok){syncStatus='error';updateSyncBadge();return false;}
    const data=await r.json();
    if(data&&typeof data==='object'&&data.months){
      // Proteção: só usa dados do Firebase se tiver ações/pdis
      // Se local tem mais dados que Firebase, não sobrescreve
      const fbTotal=(data.actions?Object.values(data.actions).length:0)
                   +(data.pdis?Object.values(data.pdis).length:0)
                   +(data.docs?Object.values(data.docs).length:0);
      const localTotal=(db.actions||[]).length+(db.pdis||[]).length+(db.docs||[]).length;
      if(localTotal>fbTotal&&Date.now()-_lastEdit<120000){
        // Local tem mais dados e foi editado nos últimos 2 min — não sobrescreve
        syncStatus='ok';lastSyncTime=new Date();updateSyncBadge();
        return false;
      }
      const localPrefs=loadPrefs()||db.settings||defaultSettings();
      const currentMonth=db.current;
      let _savedBimestre=null;
      try{_savedBimestre=localStorage.getItem('ob_bimestre');}catch(e){}
      db=data;
      db.settings=localPrefs;
      if(currentMonth&&db.months&&db.months.includes(currentMonth))db.current=currentMonth;
      if(_savedBimestre)db.onboardingBimestre=_savedBimestre;
      db.settings.titles=Object.assign({},DEFAULT_TITLES,db.settings.titles||{});
      /* Firebase omite arrays vazios e converte arrays em objetos — corrigir tudo */
      const toArr=v=>!v?[]:Array.isArray(v)?v:Object.values(v);
      db.pdis=toArr(db.pdis);
      db.actions=toArr(db.actions);
      db.docs=toArr(db.docs);
      db.teamTrainings=toArr(db.teamTrainings);
      db.macros=toArr(db.macros);
      db.roster=toArr(db.roster);
      db.months=toArr(db.months);
      db.onboardingFeedbacks=toArr(db.onboardingFeedbacks);
      if(!db.caixas||!db.caixas.length)db.caixas=DEFAULT_CAIXAS.slice();
      else db.caixas=toArr(db.caixas);
      if(db.caixas.indexOf('Suporte Max')<0)db.caixas.push('Suporte Max');
      if(!db.current)db.current=db.months[db.months.length-1]||'Junho 2026';
      /* Sanitizar campos de string em pdis/actions/docs */
      const sanitizeDate=v=>v===null||v===undefined?'':String(v);
      db.pdis.forEach(p=>{p.dataSolic=sanitizeDate(p.dataSolic);p.dateConc=sanitizeDate(p.dateConc);p.date=sanitizeDate(p.date);});
      db.actions.forEach(a=>{a.dataSolic=sanitizeDate(a.dataSolic);a.dateConc=sanitizeDate(a.dateConc);a.date=sanitizeDate(a.date);});
      db.docs.forEach(d=>{d.dataSolic=sanitizeDate(d.dataSolic);d.dateConc=sanitizeDate(d.dateConc);});
      db.macros.forEach(m=>{m.dataSolic=sanitizeDate(m.dataSolic);m.dateConc=sanitizeDate(m.dateConc);});
      /* Garantir arrays dentro de teamTrainings e reconstruir answers */
      db.teamTrainings.forEach(t=>{
        t.results=toArr(t.results);
        t.caixas=toArr(t.caixas);
        t.questions=toArr(t.questions);
        t.date=sanitizeDate(t.date);
        t.results.forEach(r=>{
          r.analista=r.analista||'';r.caixa=r.caixa||'';
          // Reconstruir answers a partir de answersArr
          if(r.answersArr&&t.questions.length){
            r.answers={};
            t.questions.forEach((q,i)=>{r.answers[q]=r.answersArr[i];});
          }
          if(!r.answers)r.answers={};
        });
      });
      try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){}
      syncStatus='ok';lastSyncTime=new Date();updateSyncBadge();
      applyTheme();
      // Preserva o semestre selecionado — não deixa o Firebase sobrescrever
      if(db.onboardingBimestre){}
      render();
      return true;
    }
    syncStatus='ok';updateSyncBadge();return false;
  }catch(e){syncStatus='error';updateSyncBadge();console.warn('Firebase pull:',e);return false;}
}

function updateSyncBadge(){
  const el=document.getElementById('sync-badge');if(!el)return;
  const icons={syncing:'⟳',ok:'●',error:'●'};
  const colors={syncing:'var(--amber-text)',ok:'var(--green-text)',error:'var(--red-text)'};
  const lbl={syncing:'sincronizando…',ok:'sincronizado'+(lastSyncTime?' '+lastSyncTime.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''),error:'erro de conexão'};
  el.innerHTML=`<span style="color:${colors[syncStatus]}">${icons[syncStatus]} ${lbl[syncStatus]}</span>`;
}

// Auto-pull a cada 10s — sem bloqueio
let _lastEdit=0;
setInterval(()=>{
  // Só puxa do Firebase se não editou nos últimos 60s
  if(!_syncing&&(Date.now()-_lastEdit)>60000)pullFromFirebase();
},15000);
/* ===== config ===== */
const TYPES={
  'Onboarding':{badge:'--blue',bar:'#3b82f6'},
  'Treinamento individual':{badge:'--blue',bar:'#60a5fa'},
  'Imersão Suporte':{badge:'--purple',bar:'#8b7df0'},
  'Treinamento de time':{badge:'--purple',bar:'#6d5de0'},
  'PDI':{badge:'--blue',bar:'#2563eb'},
  'Documentação':{badge:'--pink',bar:'#ec4899'}
};
const STATUS={'Pendente':{c:'--slate'},'Construindo material':{c:'--amber'},'Material pronto':{c:'--green'},'Aplicando...':{c:'--red'},'Concluído':{c:'--green'}};
const DOC_STATUS=['Pendente','Construindo material','Material pronto'];
const TRAIN_STATUS=['Pendente','Construindo material','Material pronto','Aplicando...','Concluído'];
const PRIO={'Alta':'var(--red)','Média':'var(--amber)','Baixa':'var(--green)'};
const DEFAULT_CAIXAS=['Silver','Vip/Saques','Integração','Frentes Estratégicas','Suporte B2C','Suporte Max'];
function defaultRoster(){return [
  {name:'Carol Spolavori',email:'caroline.spolavori@appmax.com.br',caixa:'Silver'},
  {name:'Mari Nunes',email:'mari.nunes@appmax.com.br',caixa:'Silver'},
  {name:'Kendra',email:'kendra@appmax.com.br',caixa:'Vip/Saques'},
  {name:'Pamela',email:'pamela@appmax.com.br',caixa:'Vip/Saques'},
  {name:'Anna Gomes',email:'anna.gomes@appmax.com.br',caixa:'Integração'},
  {name:'Diogo Salcedo',email:'diogo.salcedo@appmax.com.br',caixa:'Integração'},
  {name:'Liara Arguilar',email:'liara.arguilar@appmax.com.br',caixa:'Frentes Estratégicas'},
  {name:'Julia',email:'julia@appmax.com.br',caixa:'Frentes Estratégicas'},
  {name:'Jessica',email:'jessica@appmax.com.br',caixa:'Suporte B2C'},
  {name:'Andri',email:'andri@appmax.com.br',caixa:'Suporte Max'}
];}

const FONTS={
  'Sistema':"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif",
  'Moderna':"'Plus Jakarta Sans','Inter',-apple-system,sans-serif",
  'Serifada':"'DM Serif Display',Georgia,serif",
  'Arredondada':"'Nunito',-apple-system,sans-serif"
};
const SIZES={sm:'Pequeno',md:'Médio',lg:'Grande',xl:'Extra'};
const DEFAULT_TITLES={visao:'Visão Geral','impacto-pdi':'Impacto - PDI','impacto-treino':'Impacto - Treinamento',pdis:'PDIs',treinamentos:'Treinamentos',documentacao:'Documentação',macros:'Macros',onboarding:'Onboarding B2B',organograma:'Organograma',planilha:'Planilha',importar:'Importar'};
function defaultSettings(){return{theme:'claro',bodyFont:'Moderna',titleFont:'Serifada',fontSize:'md',titles:Object.assign({},DEFAULT_TITLES)};}

function badgeStyle(t){const v=(TYPES[t]||{badge:'--slate'}).badge;return `background:var(${v}-soft);color:var(${v}-text)`;}
function statusStyle(s){const v=(STATUS[s]||{c:'--slate'}).c;return `background:var(${v}-soft);color:var(${v}-text)`;}

/* ===== seed ===== */
function seed(){
  return {
    settings:defaultSettings(),
    caixas:DEFAULT_CAIXAS.slice(),
    roster:defaultRoster(),
    months:['Junho 2026'], current:'Junho 2026',
    pdis:[],actions:[],docs:[],teamTrainings:[],macros:[],
    onboardingFeedbacks:[],onboardingBimestre:'2025-07'
  };
}

let db=load(); if(!db)db=seed();
/* Aplica preferências visuais locais imediatamente (antes do Firebase responder) */
const _localPrefs=loadPrefs();
if(_localPrefs)db.settings=_localPrefs;
if(!db.settings)db.settings=defaultSettings();
db.settings.titles=Object.assign({},DEFAULT_TITLES,db.settings.titles||{});
/* Firebase converte arrays em objetos — garantir arrays em todos os campos */
const toArr=v=>!v?[]:Array.isArray(v)?v:Object.values(v);
db.pdis=toArr(db.pdis);
db.actions=toArr(db.actions);
db.docs=toArr(db.docs);
db.teamTrainings=toArr(db.teamTrainings);
db.macros=toArr(db.macros);
db.roster=toArr(db.roster);
db.months=toArr(db.months);
if(!db.caixas||!db.caixas.length)db.caixas=DEFAULT_CAIXAS.slice();
else if(!Array.isArray(db.caixas))db.caixas=Object.values(db.caixas);
if(db.caixas.indexOf('Suporte Max')<0)db.caixas.push('Suporte Max');
db.teamTrainings.forEach(t=>{
  t.results=toArr(t.results);
  t.caixas=toArr(t.caixas);
  t.questions=toArr(t.questions);
  t.results.forEach(r=>{
    if(!r.answers&&r.answersArr&&t.questions.length){
      r.answers={};t.questions.forEach((q,i)=>{r.answers[q]=r.answersArr[i];});
    }
  });
});
if(!db.onboardingFeedbacks)db.onboardingFeedbacks=[];
else db.onboardingFeedbacks=toArr(db.onboardingFeedbacks);
// Restaurar semestre salvo localmente (preferência do usuário)
try{const _ob=localStorage.getItem('ob_bimestre');if(_ob)db.onboardingBimestre=_ob;}catch(e){}
if(!db.onboardingBimestre)db.onboardingBimestre='2025-07'; // padrão: Jul–Dez 2025
persist();

/* ===== nav / routing ===== */
const NAV=[
  {grp:'Principal',items:[{id:'visao',ic:'◈'},{id:'impacto-pdi',ic:'◇'},{id:'impacto-treino',ic:'★'},{id:'onboarding',ic:'🎓'}]},
  {grp:'Ações',items:[{id:'pdis',ic:'📁'},{id:'treinamentos',ic:'◎'},{id:'documentacao',ic:'▤'},{id:'macros',ic:'⚡'}]},
  {grp:'Registros',items:[{id:'organograma',ic:'🗂'},{id:'planilha',ic:'▦'},{id:'importar',ic:'↥'}]}
];
const COUNTS={pdis:()=>db.pdis.filter(p=>p.month===db.current).length,treinamentos:()=>db.actions.filter(a=>a.month===db.current).length,documentacao:()=>db.docs.filter(d=>d.month===db.current).length,'impacto-treino':()=>db.teamTrainings.filter(t=>t.month===db.current).length,organograma:()=>db.roster.length,macros:()=>(db.macros||[]).filter(m=>m.month===db.current).length};
function T(id){return db.settings.titles[id]||DEFAULT_TITLES[id];}
let route={page:'visao',pdiId:null,teamId:null};
function go(p){route={page:p,pdiId:null,teamId:null};render();window.scrollTo(0,0);}

/* ===== helpers ===== */
function inMonth(a){return a.filter(x=>x.month===db.current);}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function round(n,d=1){const f=Math.pow(10,d);return Math.round(n*f)/f;}
function fmt(n){return Number.isInteger(n)?n:round(n,2);}
function ini(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900);}
function impPct(b,a,low){if(!b)return 0;return low?((b-a)/b*100):((a-b)/b*100);}
function pdiMetrics(p){const m=p.m;return{sla:impPct(m.slaB,m.slaA,true),cr:impPct(m.crB,m.crA,false),cf:impPct(m.cfB,m.cfA,false),tma:impPct(m.tmaB,m.tmaA,true),cs:impPct(m.csB,m.csA,false)};}
function pdiOverall(p){const x=pdiMetrics(p);return(x.sla+x.cr+x.cf+x.tma+x.cs)/5;}
function deltaTag(p){const up=p>=0;return `<span class="delta ${up?'up':'down'}">${up?'+':''}${round(p,1)}%</span>`;}
function badge(t){return `<span class="badge" style="${badgeStyle(t)}">${esc(t)}</span>`;}
function statusSelect(s,oc,opts){return `<select class="statussel" style="${statusStyle(s)}" onchange="${oc}">${opts.map(o=>`<option ${o===s?'selected':''}>${o}</option>`).join('')}</select>`;}
function starStr(a){const f=Math.max(0,Math.min(5,Math.round(a)));return '★'.repeat(f)+'☆'.repeat(5-f);}
/* roster helpers — usados pelo importador para atribuir caixa automaticamente */
function normName(s){return(s||'').toLowerCase().replace(/\s+/g,' ').trim();}
function rosterCaixa(name,email){
  const r=db.roster||[];
  /* 1. match por e-mail exato */
  if(email){const m=r.find(x=>x.email&&x.email.toLowerCase().trim()===email.toLowerCase().trim());if(m)return m.caixa;}
  /* 2. match por nome exato */
  const nn=normName(name);if(nn){const m=r.find(x=>normName(x.name)===nn);if(m)return m.caixa;}
  /* 3. match parcial: primeiro nome + sobrenome bateram */
  if(nn){const parts=nn.split(' ').filter(Boolean);const m=r.find(x=>{const xp=normName(x.name).split(' ').filter(Boolean);return parts.length>=2&&xp.length>=2&&parts[0]===xp[0]&&parts[parts.length-1]===xp[xp.length-1];});if(m)return m.caixa;}
  return '';
}
function upsertRoster(name,email,caixa){
  const r=db.roster||(db.roster=[]);
  let m=null;
  if(email)m=r.find(x=>x.email&&x.email.toLowerCase().trim()===email.toLowerCase().trim());
  if(!m)m=r.find(x=>normName(x.name)===normName(name));
  if(m){if(caixa)m.caixa=caixa;if(email&&!m.email)m.email=email;}
  else r.push({name,email:email||'',caixa:caixa||''});
}

function viewVisao(){

  const allResults=teams.flatMap(t=>(t.results||[]));
  const totalAval=allResults.length;
  const allStarsAll=allResults.map(r=>r.stars).filter(Boolean);
  const avgStarsAll=allStarsAll.length?round(allStarsAll.reduce((s,x)=>s+x,0)/allStarsAll.length,1):0;
  const totalAc=allResults.reduce((s,r)=>s+(typeof r.ac==='number'?r.ac:0),0);
  const totalTot=allResults.reduce((s,r)=>s+(typeof r.ac==='number'?r.ac+(typeof r.er==='number'?r.er:0):0),0);
  const avgAcert=totalTot?Math.round(totalAc/totalTot*100):0;
  const isDone=x=>x.status==='Concluído'||(x.status==='Material pronto'&&x._tipo==='doc');
  const all=[...pdis.map(p=>({type:'PDI',status:p.status})),...acts.map(a=>({type:a.type,status:a.status})),...docs.map(d=>({type:'Documentação',status:d.status,_tipo:'doc'}))];
  const total=all.length,concl=all.filter(x=>isDone(x)).length,pend=all.filter(x=>x.status==='Pendente').length,andamento=total-concl-pend;

  const bars=rows.map(r=>`<div class="barrow"><div class="nm">${esc(r.t)}</div><div class="track"><div class="fill" style="width:${r.n/maxN*100}%;background:${(TYPES[r.t]||{}).bar||'#999'}"></div></div><div class="vl">${r.n}</div></div>`).join('');

  /* comparativo por mês — inclui TODAS as coleções */
  const ms=db.months.map(mn=>{
    const allItens=[
      ...db.pdis.filter(x=>x.month===mn),

      ...db.docs.filter(x=>x.month===mn)

    const total=allItens.length;
    const done=allItens.filter(x=>x.status==='Concluído'||(x.status==='Material pronto'&&db.docs.find(d=>d.id===x.id))).length;
    const mac=(db.macros||[]).filter(x=>x.month===mn).length;
    const pdiCount=db.pdis.filter(x=>x.month===mn).length;

  return `<div class="page-h"><h1>${esc(T('visao'))} ✦</h1><p>Resumo mensal — selecione um mês no topo para navegar.</p></div>
  <div class="mcards">

    <div class="mcard">
      <div class="lbl">Total de ações programadas<span class="lbl-ic">◈</span></div>
      <div class="val">${total}</div>
      <div class="foot">${db.current}</div>
    </div>

    <div class="mcard">
      <div class="lbl">Total de ações concluídas<span class="lbl-ic">✓</span></div>
      <div class="val">${concl}</div>
      <span class="tag" style="background:var(--green-soft);color:var(--green-text)">↑ ${total?Math.round(concl/total*100):0}%</span>
    </div>

    <div class="mcard">
      <div class="lbl">Ações pendentes<span class="lbl-ic">⌛</span></div>
      <div class="val">${andamento+pend}</div>
      <span class="tag" style="background:var(--amber-soft);color:var(--amber-text)">em progresso</span>
    </div>

    <div class="mcard">
      <div class="lbl">Macros criadas<span class="lbl-ic">⚡</span></div>
      <div class="val">${macros.length}</div>
      <div class="foot">não somada em ações</div>
    </div>

    <div class="mcard">
      <div class="lbl">Melhora média PDIs<span class="lbl-ic">↑</span></div>
      <div class="val">${melhora?'+'+melhora+'%':'—'}</div>
      <span class="tag" style="background:var(--green-soft);color:var(--green-text)">consolidado métricas</span>
    </div>

    <div class="mcard" style="cursor:pointer" onclick="go('impacto-treino')">
      <div class="lbl">Média: Avaliação dos treinamentos<span class="lbl-ic">★</span></div>
      <div class="val" style="color:var(--gold)">${avgStarsAll?avgStarsAll+'/5 ★':'—'}</div>
      ${totalAval
        ? `<span class="tag" style="background:var(--green-soft);color:var(--green-text)">✓ ${avgAcert}% acertos</span>`
        : '<span class="tag" style="background:var(--slate-soft);color:var(--slate-text)">sem dados ainda</span>'}

        <div class="legend"><span><i style="background:var(--green)"></i>Concluído (${concl})</span><span><i style="background:var(--blue)"></i>Em and. (${andamento})</span><span><i style="background:var(--amber)"></i>Pendente (${pend})</span></div></div></div>
  </div>

    <div class="legend" style="margin-top:6px"><span><i style="background:var(--purple-2)"></i>Total</span><span><i style="background:var(--bar-alt)"></i>Concluídos</span></div></div>
  <div class="panel"><div class="panel-h"><div class="pi">◆</div><h2>Resumo por mês</h2></div>
    <div class="msum">${ms.map(s=>`<div class="c ${s.mn===db.current?'cur':''}"><h3>${s.mn}</h3><p>${s.mn===db.current?'Treinamentos e PDIs — dados reais':'Registro do mês'}</p><div class="st">${s.total} ações · ${s.pdiCount} PDIs · ${s.done} conc.${s.mac?` · ${s.mac} macros`:''}</div></div>`).join('')}</div></div>`;

function viewPdis(){
  if(route.pdiId)return viewPdiDetail(route.pdiId);
  const pdis=inMonth(db.pdis),byA={};pdis.forEach(p=>(byA[p.analyst]=byA[p.analyst]||[]).push(p));
  const cards=Object.keys(byA).sort((a,b)=>{const da=Math.max(...(byA[a].map(p=>parseDateBR(p.dataSolic)||new Date(0)).map(d=>d.getTime())));const db2=Math.max(...(byA[b].map(p=>parseDateBR(p.dataSolic)||new Date(0)).map(d=>d.getTime())));return db2-da;}).map(a=>{
    const l=byA[a],done=l.filter(p=>p.status==='Concluído').length,res=l.some(p=>p.hasResults);
    const ids=l.map(p=>p.id).join(',');

      +'<button onclick="delPdiGroup(\''+ids+'\')" style="position:absolute;top:10px;right:10px;border:none;background:none;color:var(--text-3);font-size:15px;cursor:pointer;padding:2px 5px;border-radius:6px" title="Excluir PDI">✕</button>'
      +'<div style="cursor:pointer" onclick="openPdi(\''+l[0].id+'\')">'
      +'<div class="ico">📁</div><h3>'+esc(a)+'</h3>'
      +'<div class="meta">'+l.length+' PDI · '+done+' concluído'+(done!==1?'s':'')+'</div>'
      +(l[0].dataSolic?'<div class="meta" style="display:flex;gap:12px">'
      +'<span>📋 Solic.: '+esc(l[0].dataSolic)+'</span>'
      +(l[0].dateConc?'<span>✓ Conc.: '+esc(l[0].dateConc)+'</span>':'')
      +'</div>':'')
      +(res?'<span class="chip">✓ com resultados</span>':'<span class="chip" style="color:var(--amber-text);border-color:var(--amber-soft)">resultados pendentes</span>')
      +'</div></div>';
  }).join('');
  // Alertas de PDIs sem resultado há mais de 15 dias

    if(p.hasResults)return false;

  const alertBanner=vencidos.length?`<div style="background:var(--amber-soft);border:1px solid var(--amber);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
    <span style="font-size:1.3em">⚠️</span>

      <div style="font-size:.85em;color:var(--amber-text);margin-top:3px">${vencidos.map(p=>esc(p.analyst)).join(', ')} — clique na pasta para preencher os resultados</div>
    </div>
  </div>`:'';
  return `<div class="page-h"><h1>${esc(T('pdis'))}</h1><p>Cada pastinha reúne todos os PDIs de um analista.</p></div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="btn primary edit-only" onclick="openPdiModal()">+ Novo PDI</button></div>
  ${alertBanner}
  ${pdis.length?`<div class="folders">${cards}</div>`:'<div class="empty">Nenhum PDI neste mês.<br><br><button class="btn primary" onclick="openPdiModal()">+ Novo PDI</button></div>'}`;
}

/* ---------- IMPACTO - PDI ---------- */
let pdiAnalystFilter='Todos';
function viewImpactoPdi(){
  const allPdis=inMonth(db.pdis).filter(p=>p.hasResults);
  if(!allPdis.length)return `<div class="page-h"><h1>${esc(T('impacto-pdi'))}</h1><p>Consolidado automático de todos os PDIs com resultados preenchidos.</p></div><div class="empty">Nenhum PDI com resultados neste mês ainda.</div>`;
  const analysts=['Todos',...new Set(allPdis.map(p=>p.analyst))];
  const pdis=pdiAnalystFilter==='Todos'?allPdis:allPdis.filter(p=>p.analyst===pdiAnalystFilter);
  const avg=k=>round(pdis.reduce((s,p)=>s+pdiMetrics(p)[k],0)/pdis.length,1);
  const A={sla:avg('sla'),cr:avg('cr'),cf:avg('cf'),tma:avg('tma'),cs:avg('cs')};
  const card=(l,v)=>`<div style="background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:14px 16px"><div style="font-size:10px;letter-spacing:.05em;text-transform:uppercase;opacity:.85">${l}</div><div style="font-family:'Inter',sans-serif;font-size:1.9em;font-weight:700;margin-top:6px;letter-spacing:-.5px;color:#fff">+${v}%</div><div style="font-size:.78em;opacity:.8;margin-top:2px">↑ melhora</div></div>`;
  const mt=[['SLA 1ª resp / média (min)','sla'],['Chats resp / média dia','cr'],['Chats fech / média dia','cf'],['TMA / média dia (h)','tma'],['CSAT / semanal','cs']];
  const maxA=Math.max(...mt.map(([_,k])=>Math.abs(A[k])),1);

  const byA=pdis.map(p=>({a:p.analyst,o:pdiOverall(p)})).sort((x,y)=>y.o-x.o),maxO=Math.max(...byA.map(b=>b.o),1);

function teamCompute(t){
  const res=t.results||[],qs=t.questions||[];
  const analysts=res.map(r=>{let ac,er;if(typeof r.ac==='number'){ac=r.ac;er=(typeof r.er==='number')?r.er:0;}else{ac=qs.filter(q=>r.answers[q]===true).length;er=qs.filter(q=>r.answers[q]===false).length;}return{name:r.analista,caixa:r.caixa,ac,er,stars:r.stars,total:ac+er};});
  const cx={};(t.caixas||[]).forEach(c=>cx[c]={name:c,ac:0,er:0,stars:[],n:0});
  analysts.forEach(a=>{const c=cx[a.caixa]||(cx[a.caixa]={name:a.caixa,ac:0,er:0,stars:[],n:0});c.ac+=a.ac;c.er+=a.er;if(a.stars)c.stars.push(a.stars);c.n++;});
  const caixaArr=Object.values(cx).map(c=>({...c,total:c.ac+c.er,errRate:(c.ac+c.er)?c.er/(c.ac+c.er)*100:0,avgStars:c.stars.length?c.stars.reduce((s,x)=>s+x,0)/c.stars.length:0}));
  const qErr=qs.map(q=>({q,er:res.filter(r=>r.answers[q]===false).length})).sort((a,b)=>b.er-a.er);
  return{analysts,caixaArr,qErr,res,qs};
}
function worstCaixa(arr){return [...arr].filter(c=>c.name!=='Não atribuído'&&c.er>0).sort((a,b)=>b.errRate-a.errRate)[0];}

function parseCSV(text,delim){const rows=[];let row=[],f='',i=0,q=false;const D=delim||',';while(i<text.length){const c=text[i];if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i+=2;continue;}q=false;i++;continue;}f+=c;i++;continue;}if(c==='"'){q=true;i++;continue;}if(c===D){row.push(f);f='';i++;continue;}if(c==='\r'){i++;continue;}if(c==='\n'){row.push(f);rows.push(row);row=[];f='';i++;continue;}f+=c;i++;}if(f!==''||row.length){row.push(f);rows.push(row);}return rows;}
function detectDelim(text){let i=0,q=false,comma=0,semi=0,tab=0;while(i<text.length){const c=text[i];if(c==='"'){q=!q;i++;continue;}if(!q){if(c===',')comma++;else if(c===';')semi++;else if(c==='\t')tab++;else if(c==='\n')break;}i++;}if(tab>comma&&tab>semi)return '\t';return semi>comma?';':',';}
function nameFromEmail(e){
  const l=(e||'').split('@')[0];
  // Converte partes separadas por . _ - em Nome Sobrenome capitalizado
  const parts=l.split(/[._-]+/).filter(Boolean).map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase());
  // Pega só as duas primeiras partes (nome + sobrenome) para não ficar longo
  return parts.slice(0,2).join(' ')||e;
}
function truncate(s,n){s=String(s);return s.length>n?s.slice(0,n-1)+'…':s;}
function norm(s){return (s||'').toString().replace(/\s+/g,' ').trim().toLowerCase();}
function deaccent(s){return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function nkey(s){return deaccent(norm(s));}
function rosterCaixa(name,email){const ek=nkey(email),nn=nkey(name);
  if(ek){const m=(db.roster||[]).find(x=>nkey(x.email)&&nkey(x.email)===ek);if(m)return m.caixa;}
  if(nn){const m=(db.roster||[]).find(x=>nkey(x.name)===nn);if(m)return m.caixa;}
  if(email){const dn=nkey(nameFromEmail(email));const m=(db.roster||[]).find(x=>nkey(x.name)===dn);if(m)return m.caixa;}
  return '';}
function upsertRoster(name,email,caixa){const ek=nkey(email),nn=nkey(name);
  let m=(db.roster||[]).find(x=>(ek&&nkey(x.email)===ek)||nkey(x.name)===nn);
  if(m){m.caixa=caixa;if(email&&!m.email)m.email=email;}else db.roster.push({name,email:email||'',caixa});}
function applyRoster(id){const t=db.teamTrainings.find(x=>x.id===id);if(!t||!t.results)return;let n=0;t.results.forEach(r=>{if(!r.caixa||r.caixa==='Não atribuído'){const cx=rosterCaixa(r.analista,r.email);if(cx){r.caixa=cx;n++;}}});persist();render();toast(n?n+' analista(s) atribuído(s) pelo organograma':'Nenhum desses analistas está no organograma ainda');}
function isCorrect(v){v=(v||'').toString().toLowerCase().trim();if(['1','acerto','acertou','certo','correto','certa','correta','c','x','sim','true','ok'].includes(v))return true;if(['0','erro','errou','errado','incorreto','errada','e','nao','não','false'].includes(v))return false;const n=parseFloat(v.replace(',','.'));if(!isNaN(n))return n>=1;return null;}
function importTeamResults(id){
  const f=document.getElementById('teamCsv').files[0];if(!f){toast('Selecione um arquivo CSV ou XLSX');return;}
  const isXlsx=/\.xlsx?$/i.test(f.name);
  const r=new FileReader();
  r.onload=()=>{try{
    /* ── 1. Ler linhas brutas ─────────────────────────────────── */
    let rows;
    if(isXlsx){
      const wb=XLSX.read(r.result,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false})
               .filter(rw=>rw.some(c=>c!==null&&String(c).trim()!==''));
    } else {
      const text=r.result; // já é string (readAsText)
      rows=parseCSV(text,detectDelim(text)).filter(rw=>rw.some(c=>c&&c.trim()));
    }
    if(rows.length<2){toast('Arquivo vazio ou sem respostas');return;}

    /* ── 2. Mapear colunas do cabeçalho ──────────────────────── */
    const raw=rows[0].map(h=>String(h||'').trim());
    const low=raw.map(h=>h.toLowerCase());
    const find=re=>low.findIndex(h=>re.test(h));

    const tsI   =find(/carimbo|data.hora|timestamp/);
    const emailI=find(/e.?mail|endere.o de e/);
    const nameI =low.findIndex(h=>h==='nome'||h==='analista'||h==='nome do analista'||/^analista\b/.test(h));
    const caixaI=find(/caixa/);
    const scoreI=find(/pontua|^score$|^pontos$/);
    const starsI=low.findIndex(h=>
      h.includes('avalia') && (h.includes('geral')||h.includes('trein')||h.includes('forma geral')) ||
      h.includes('estrela') || h==='avaliacao' || h==='avaliação'
    );

    /* ── 3. Detectar padrão "gabarito intercalado"  ────────────
       Ex: col[4]=pergunta, col[5]="Resposta certa ou errada?"
       Nesse caso usamos col[5] para saber acerto/erro e
       col[4] como label da pergunta.                            */
    const isGabaritoCol=i=>low[i]&&/resposta\s+(certa|errada|certo|errado|certa ou errada)/.test(low[i]);
    const intercalado=raw.some((_,i)=>isGabaritoCol(i));

    /* colunas a excluir da lista de "perguntas" */
    const excl=new Set([tsI,emailI,nameI,caixaI,scoreI,starsI].filter(x=>x>=0));
    raw.forEach((_,i)=>{
      const h=low[i];
      if(!h||/^colun[ao]\s*\d+$/i.test(h)||/^pontos?$/i.test(h)) excl.add(i);
      if(h.includes('%')||h.includes('porcent')) excl.add(i);
      if(isGabaritoCol(i)) excl.add(i); // gabarito não é pergunta
      // Coluna de feedback/recado — não pontua, não conta como questão
      if(h.includes('recado')||h.includes('mensagem')||h.includes('feedback')||(h.includes('deixar')&&h.includes('algum'))) excl.add(i);
    });

    /* pares (pergunta, gabarito) para o padrão intercalado */
    let pares=[];  // [{qI, gI, label}]
    if(intercalado){
      raw.forEach((_,i)=>{
        if(excl.has(i)) return; // já excluído
        const next=i+1;
        if(next<raw.length && isGabaritoCol(next)){
          pares.push({qI:i,gI:next,label:raw[i]});
          excl.add(next); // gabarito
        }
      });
    }

    /* perguntas abertas (sem gabarito ao lado) */
    const qIdx=raw.map((_,i)=>i).filter(i=>!excl.has(i)&&!pares.find(p=>p.qI===i));

    /* ── 4. Parsear cada linha de resposta ───────────────────── */
    const results=[];
    rows.slice(1).forEach(rw=>{
      const cell=i=>String(rw[i]===null||rw[i]===undefined?'':rw[i]).trim();
      const email=emailI>=0?cell(emailI):'';
      let name=nameI>=0?cell(nameI):'';
      // Se não tem nome mas tem email, converte email em nome legível
      if(!name&&email)name=nameFromEmail(email);
      // Se o nome parece um email (contém @), converte
      if(name&&name.includes('@'))name=nameFromEmail(name);
      if(!name) return;

      let caixa=caixaI>=0?cell(caixaI):'';
      if(!caixa) caixa=rosterCaixa(name,email);
      if(!caixa) caixa='Não atribuído';

      /* acertos/erros — gabarito intercalado tem prioridade */
      const answers={};
      let ac=0,er=0;

      if(intercalado && pares.length){
        pares.forEach(p=>{
          const v=isCorrect(cell(p.gI));
          answers[p.label]= v!==null ? v : true; // dúvida → acerto
          if(v===true)ac++;
          else er++;
        });
        /* perguntas abertas restantes — tenta isCorrect */
        qIdx.forEach(i=>{
          const v=isCorrect(cell(i));
          if(v!==null){answers[raw[i]]=v;if(v)ac++;else er++;}
        });
      } else {
        /* sem gabarito intercalado — tenta isCorrect em todas as cols */
        let recognized=0,cells=0;
        rows.slice(1).forEach(rw2=>qIdx.forEach(i=>{cells++;if(isCorrect(String(rw2[i]||'').trim())!==null)recognized++;}));
        const formatA=cells>0&&recognized/cells>0.5;
        if(formatA){
          qIdx.forEach(i=>{const v=isCorrect(cell(i));if(v!==null){answers[raw[i]]=v;if(v)ac++;else er++;}});
        } else {
          /* estimativa por moda */
          const modes={};
          qIdx.forEach(i=>{const cc={};rows.slice(1).forEach(rw2=>{const v=norm(String(rw2[i]||''));if(v)cc[v]=(cc[v]||0)+1;});let best='',bn=-1;for(const k in cc){if(cc[k]>bn){bn=cc[k];best=k;}}modes[i]=best;});
          qIdx.forEach(i=>{const v=norm(cell(i));const ok=v===modes[i]&&v!=='';answers[raw[i]]=ok;if(ok)ac++;else er++;});
        }
      }

      /* pontuação explícita sobrescreve contagem */
      if(scoreI>=0){
        const sv=cell(scoreI).replace(',','.');
        const mm=sv.match(/([\d.]+)\s*\/\s*([\d.]+)/);
        if(mm){ac=parseFloat(mm[1]);er=Math.max(0,parseFloat(mm[2])-ac);}
        else{const n=parseFloat(sv);if(!isNaN(n)){ac=n;er=0;}} // pontuação só (sem total)
      }

      let stars=0;
      if(starsI>=0){const s=parseFloat(cell(starsI).replace(',','.'));if(!isNaN(s))stars=Math.max(0,Math.min(5,s));}

      // Captura feedback ("recado" ou última coluna de texto livre)
      let feedback='';
      const fbIdx=low.findIndex(h=>h.includes('recado')||h.includes('mensagem')||h.includes('feedback')||h.includes('deixar'));
      if(fbIdx>=0){const fv=String(rw[fbIdx]===null||rw[fbIdx]===undefined?'':rw[fbIdx]).trim();if(fv)feedback=fv;}
      results.push({analista:name,email,caixa,answers,stars,ac,er,feedback});
    });

    if(!results.length){toast('Nenhuma linha de resposta válida encontrada');return;}
    const t=db.teamTrainings.find(x=>x.id===id);
    const allLabels=intercalado?pares.map(p=>p.label):qIdx.map(i=>raw[i]);
    t.results=results;
    t.questions=allLabels;
    t.errMode=intercalado?'gabarito':(qIdx.length?'estimado':'gabarito');
    /* atualiza caixas do treino — usa EXATAMENTE os nomes da planilha, sem duplicar */
    if(caixaI>=0){
      const novas=results.map(x=>x.caixa).filter(c=>c&&c!=='Não atribuído');
      // Deduplicar por nome normalizado (case-insensitive, sem espaços extras)
      const seen=new Map();
      novas.forEach(c=>{const k=c.trim().toLowerCase();if(!seen.has(k))seen.set(k,c.trim());});
      t.caixas=[...seen.values()];
      // Também atualizar db.caixas com novos nomes únicos
      seen.forEach((nome,key)=>{
        const existe=db.caixas.find(c=>c.trim().toLowerCase()===key);
        if(!existe)db.caixas.push(nome);
      });
    }
    /* registra analistas no organograma — preserva possibilidade de mover/excluir */
    results.forEach(res=>{if(res.caixa&&res.caixa!=='Não atribuído')upsertRoster(res.analista,res.email||'',res.caixa);});
    persist();render();toast(results.length+' respostas importadas com sucesso');
  }catch(err){toast('Erro ao ler o arquivo: '+err.message);console.error(err);}};
  /* CSV → texto; XLSX → ArrayBuffer */
  if(isXlsx) r.readAsArrayBuffer(f); else r.readAsText(f,'utf-8');
}
function setResultCaixa(id,i,caixa){const t=db.teamTrainings.find(x=>x.id===id);if(t&&t.results&&t.results[i]){const r=t.results[i];r.caixa=caixa;if(caixa&&caixa!=='Não atribuído')upsertRoster(r.analista,r.email||'',caixa);persist();render();}}
function downloadTeamTemplate(id){
  const t=db.teamTrainings.find(x=>x.id===id);const qs=(t.questions&&t.questions.length)?t.questions:['Pergunta 1','Pergunta 2','Pergunta 3'];

/* ========================================================
   ONBOARDING B2B — feedback semestral
   ======================================================== */
function currentBimestreKey(){
  const now=new Date();const y=now.getFullYear();const m=now.getMonth();
  const start=m<6?0:6;
  return y+'-'+(start===0?'01':'07');
}
function bimestreLabel(key){
  if(!key)return '';
  const [y,ms]=key.split('-');const s=parseInt(ms);
  const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const ini=MESES[s-1];const fim=MESES[s+4];
  return `${ini} – ${fim} ${y}`;
}
function bimestreKeys(){
  const keys=[];
  const now=new Date();
  for(let y=2025;y<=now.getFullYear()+1;y++){
    keys.push(y+'-01');keys.push(y+'-07');
  }
  const limit=now.getFullYear()+(now.getMonth()>=6?1:0)+'-'+(now.getMonth()>=6?'01':'07');
  // Começa em Jul/2025 (primeiro semestre com dados) e vai até 1 semestre à frente
  return keys.filter(k=>k>='2025-07'&&k<=limit);
}
function inBimestre(dateStr,key){
  if(!dateStr||!key)return false;
  try{
    const d=new Date(dateStr);
    const [y,ms]=key.split('-');const s=parseInt(ms);
    return d.getFullYear()===parseInt(y)&&d.getMonth()>=(s-1)&&d.getMonth()<=(s+3);
  }catch(e){return false;}
}
function onboardingInBimestre(){
  return (db.onboardingFeedbacks||[]).filter(f=>inBimestre(f.date,db.onboardingBimestre));
}

  if(!db.onboardingBimestre)db.onboardingBimestre=currentBimestreKey();

  const bSel=keys.map(k=>`<option value="${k}" ${k===db.onboardingBimestre?'selected':''}>${bimestreLabel(k)}</option>`).join('');
  const hasName=db.onboardingBimestre>='2026-07';

  /* ── Cards de métricas de topo ── */
  const total=feedbacks.length;
  const geralVals=feedbacks.map(f=>parseFloat(f.geral)).filter(v=>!isNaN(v));
  const avgGeral=geralVals.length?round(geralVals.reduce((s,v)=>s+v,0)/geralVals.length,1):0;
  const clarVals=feedbacks.map(f=>parseFloat(f.clareza)).filter(v=>!isNaN(v));
  const avgClar=clarVals.length?round(clarVals.reduce((s,v)=>s+v,0)/clarVals.length,1):0;
  const matVals=feedbacks.map(f=>parseFloat(f.materiais)).filter(v=>!isNaN(v));
  const avgMat=matVals.length?round(matVals.reduce((s,v)=>s+v,0)/matVals.length,1):0;
  const totPrepared=feedbacks.filter(f=>f.preparado==='Sim, totalmente').length;
  const pctPrepared=total?Math.round(totPrepared/total*100):0;

  /* ── Função para renderizar cada card de pergunta ── */
  function renderCard(q){
    const vals=feedbacks.map(f=>f[q.key]).filter(Boolean);
    if(!vals.length) return `<div class="panel" style="opacity:.55"><div class="panel-h"><div class="pi">${q.emoji}</div><h2>${esc(q.label)}</h2></div><div class="empty" style="padding:20px 0">Sem respostas ainda</div></div>`;

    if(q.type==='star5'){
      const nums=vals.map(v=>parseFloat(v)).filter(v=>!isNaN(v));
      const avg=nums.length?round(nums.reduce((s,v)=>s+v,0)/nums.length,1):0;
      const dist=[5,4,3,2,1].map(n=>({n,c:nums.filter(v=>Math.round(v)===n).length}));
      const maxC=Math.max(...dist.map(d=>d.c),1);
      return `<div class="panel"><div class="panel-h"><div class="pi">${q.emoji}</div><h2>${esc(q.label)}</h2></div>
        <div style="display:flex;align-items:center;gap:24px;margin-bottom:16px">
          <div style="text-align:center">
            <div style="font-family:'Inter',sans-serif;font-size:3em;font-weight:700;color:var(--gold);line-height:1">${avg}</div>
            <div style="color:var(--gold);font-size:1.3em;margin-top:4px">${starStr(avg)}</div>
            <div style="font-size:.8em;color:var(--text-3);margin-top:2px">de 5 · ${nums.length} respostas</div>
          </div>
          <div style="flex:1">${dist.map(d=>`<div class="barrow" style="margin-bottom:7px"><div class="nm" style="width:24px;color:var(--gold);font-weight:600">${d.n}★</div><div class="track"><div class="fill" style="width:${d.c/maxC*100}%;background:var(--gold)"></div></div><div class="vl" style="width:28px">${d.c}</div></div>`).join('')}</div>
        </div></div>`;
    }

    if(q.type==='choice'){
      const opts=q.options||[...new Set(vals)];
      const counts=opts.map(o=>({o,c:vals.filter(v=>v===o).length}));
      const maxC=Math.max(...counts.map(d=>d.c),1);
      const colors=['var(--green)','var(--amber)','var(--red)','var(--blue)','var(--purple)'];
      return `<div class="panel"><div class="panel-h"><div class="pi">${q.emoji}</div><h2>${esc(q.label)}</h2><span style="margin-left:auto;font-size:.8em;color:var(--text-3)">${vals.length} respostas</span></div>
        ${counts.map((d,i)=>`<div class="barrow" style="margin-bottom:10px"><div class="nm" style="width:auto;flex:1;text-align:left;padding-right:12px;font-size:.85em;white-space:normal;line-height:1.3">${esc(d.o)}</div><div class="track" style="width:120px;flex:none"><div class="fill" style="width:${d.c/maxC*100}%;background:${colors[i%colors.length]}"></div></div><div class="vl" style="width:60px;text-align:right"><b>${d.c}</b> <span style="color:var(--text-3)">(${total?Math.round(d.c/total*100):0}%)</span></div></div>`).join('')}
      </div>`;
    }

    if(q.type==='text'){
      const nonEmpty=vals.filter(v=>v&&v.length>2&&!/^(n(ão|ao|enhum)|nada|ok|não sei|sem|\/|-|\.+)$/i.test(v.trim()));
      if(!nonEmpty.length) return `<div class="panel"><div class="panel-h"><div class="pi">${q.emoji}</div><h2>${esc(q.label)}</h2></div><div class="empty" style="padding:16px 0">Nenhuma resposta com conteúdo relevante</div></div>`;
      return `<div class="panel"><div class="panel-h"><div class="pi">${q.emoji}</div><h2>${esc(q.label)}</h2><span style="margin-left:auto;font-size:.8em;color:var(--text-3)">${nonEmpty.length} respostas</span></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">
          ${nonEmpty.map(v=>`<div style="background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:.88em;color:var(--text-2);line-height:1.55;font-style:italic">"${esc(v)}"</div>`).join('')}
        </div></div>`;
    }
    return '';
  }

  /* ── Tabela de analistas (só a partir de Jul/2026) ── */
  const tabelaAnalistas=hasName&&feedbacks.some(f=>f.nome)?`
    <div class="panel"><div class="panel-h"><div class="pi">👤</div><h2>Respostas por analista</h2></div>
    <div class="wrap-x"><table class="tbl"><thead><tr><th>Analista</th><th>Caixa</th><th>Geral</th><th>Materiais</th><th>Clareza</th><th>Preparado?</th></tr></thead><tbody>
    ${feedbacks.filter(f=>f.nome).map(f=>`<tr><td><b>${esc(f.nome)}</b></td><td>${esc(f.caixa||'—')}</td><td style="color:var(--gold)">${f.geral||'—'} ★</td><td style="color:var(--gold)">${f.materiais||'—'} ★</td><td style="color:var(--gold)">${f.clareza||'—'} ★</td><td>${esc(f.preparado||'—')}</td></tr>`).join('')}
    </tbody></table></div></div>`:'';

  return `<div class="page-h"><h1>${esc(T('onboarding'))} 🎓</h1><p>Avaliações de satisfação dos analistas após o Onboarding B2B — visão semestral.</p></div>

  <!-- Seletor de semestre -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
    <label style="font-size:.85em;font-weight:600;color:var(--text-2)">Período:</label>
    <select style="border:1px solid var(--border-2);background:var(--surface);border-radius:9px;padding:8px 14px;font-size:.95em;color:var(--text);font-weight:500" onchange="db.onboardingBimestre=this.value;try{localStorage.setItem('ob_bimestre',this.value);}catch(e){}render()">${bSel}</select>
    <span style="font-size:.82em;color:var(--text-3)">${total} avaliação${total!==1?'ões':''} neste período</span>
    <button class="btn primary sm edit-only" style="margin-left:auto" onclick="openOnboardingImport()">↥ Importar planilha</button>
  </div>

  <!-- Cards de resumo -->
  ${total?`<div class="mcards" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px">
    <div class="mcard"><div class="lbl">Avaliações coletadas</div><div class="val">${total}</div><div class="foot">${bimestreLabel(db.onboardingBimestre)}</div></div>
    <div class="mcard"><div class="lbl">Nota geral média</div><div class="val" style="color:var(--gold)">${avgGeral}/5 ★</div></div>
    <div class="mcard"><div class="lbl">Clareza e didática</div><div class="val" style="color:var(--gold)">${avgClar}/5 ★</div></div>
    <div class="mcard"><div class="lbl">Sentiu-se preparado</div><div class="val" style="color:var(--green-text)">${pctPrepared}%</div><span class="tag" style="background:var(--green-soft);color:var(--green-text)">${totPrepared} de ${total}</span></div>
  </div>`:''}

  <!-- Cards por questão -->
  ${total?OB_QUESTIONS.map(q=>renderCard(q)).join(''):'<div class="empty">Nenhuma avaliação importada para este período.<br><br><button class="btn primary" onclick="openOnboardingImport()">↥ Importar planilha de feedback</button></div>'}

  ${tabelaAnalistas}`;
}

function importOnboarding(){
  const f=document.getElementById('ob_file').files[0];if(!f){toast('Selecione um arquivo');return;}
  const replace=document.getElementById('ob_replace').value==='replace';
  const isXlsx=/\.xlsx?$/i.test(f.name);
  const r=new FileReader();
  r.onload=()=>{try{
    let rows;
    if(isXlsx){
      const wb=XLSX.read(r.result,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false}).filter(rw=>rw.some(c=>String(c).trim()));
    } else {
      const text=r.result;
      rows=parseCSV(text,detectDelim(text)).filter(rw=>rw.some(c=>c&&c.trim()));
    }
    if(rows.length<2){toast('Arquivo vazio');return;}
    const raw=rows[0].map(h=>String(h||'').trim());
    const low=raw.map(h=>h.toLowerCase().replace(/\s+/g,' ').replace(/\n/g,' '));
    const fi=i=>low.findIndex(h=>h.includes(i));
    const dateI=fi('carimbo');
    const geralI=low.findIndex(h=>h.includes('avaliaria')&&h.includes('geral'));
    const duracaoI=low.findIndex(h=>h.includes('dura')&&(h.includes('adequada')||h.includes('aprendizado')));
    const matI=low.findIndex(h=>h.includes('materiai')||h.includes('ajudaram no aprendizado'));
    const aprofI=low.findIndex(h=>h.includes('aprofund'));
    const clarI=low.findIndex(h=>h.includes('clareza')||h.includes('did'));
    const recepI=low.findIndex(h=>h.includes('receptiva')||h.includes('aberta'));
    const avontI=low.findIndex(h=>h.includes('vontade')||h.includes('interagir'));
    const comI=low.findIndex(h=>h.includes('coment')&&(h.includes('forma')||h.includes('sugestão')||h.includes('sugestao')));
    const prepI=low.findIndex(h=>h.includes('preparad')&&h.includes('suporte'));
    const gostouI=low.findIndex(h=>h.includes('mais gostou'));
    const melhI=low.findIndex(h=>h.includes('melhorad')&&h.includes('turma'));
    const recadoI=low.findIndex(h=>h.includes('recado')||h.includes('mensagem'));
    const nomeI=low.findIndex(h=>h==='nome'||h==='analista'||h==='nome do analista');
    const caixaI=fi('caixa');
    console.log('Colunas detectadas:',{dateI,geralI,duracaoI,matI,aprofI,clarI,recepI,avontI,comI,prepI,gostouI,melhI,recadoI,nomeI,caixaI});
    const get=(rw,i)=>i>=0?String(rw[i]===null||rw[i]===undefined?'':rw[i]).trim():'';
    const newFb=[];
    rows.slice(1).forEach(rw=>{
      const dateRaw=get(rw,dateI);
      let date=null;
      try{date=dateRaw?new Date(dateRaw).toISOString():new Date().toISOString();}catch(e){date=new Date().toISOString();}
      newFb.push({
        date,
        geral:get(rw,geralI),duracao:get(rw,duracaoI),materiais:get(rw,matI),
        aprofundar:get(rw,aprofI),clareza:get(rw,clarI),receptiva:get(rw,recepI),
        avontade:get(rw,avontI),comentario:get(rw,comI),preparado:get(rw,prepI),
        gostou:get(rw,gostouI),melhorar:get(rw,melhI),recado:get(rw,recadoI),
        nome:get(rw,nomeI),caixa:get(rw,caixaI)
      });
    });
    if(!db.onboardingFeedbacks)db.onboardingFeedbacks=[];
    if(replace)db.onboardingFeedbacks=db.onboardingFeedbacks.filter(f=>!inBimestre(f.date,db.onboardingBimestre));
    db.onboardingFeedbacks.push(...newFb);
    persist();closeModal();render();toast(newFb.length+' avaliações importadas para '+bimestreLabel(db.onboardingBimestre));
  }catch(e){toast('Erro: '+e.message);console.error(e);}};
  if(isXlsx)r.readAsArrayBuffer(f);else r.readAsText(f,'utf-8');
}

let trainFilter='Todos';
function parseDateBR(s){
  if(!s)return null;
  s=String(s).trim();
  const parts=s.split('/');
  if(parts.length===2){
    // dd/mm — assume ano atual
    const y=new Date().getFullYear();
    const d=new Date(y,parseInt(parts[1])-1,parseInt(parts[0]));
    return isNaN(d)?null:d;
  }
  if(parts.length===3){
    // dd/mm/aaaa
    const d=new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]));
    return isNaN(d)?null:d;
  }
  return null;
}
function sortByDateSolic(arr){return [...arr].sort((a,b)=>{const da=parseDateBR(a.dataSolic)||new Date(0),db2=parseDateBR(b.dataSolic)||new Date(0);return db2-da;});}

async function forceSyncAll(silent){
  const el=document.getElementById('force-sync-result');
  if(!silent&&el)el.innerHTML='<span style="color:var(--amber-text)">⟳ Enviando dados...</span>';
  syncStatus='syncing';updateSyncBadge();
  const BASE=FB_URL.replace('.json','');
  const fields=['pdis','actions','docs','macros','roster','months','caixas','current','onboardingFeedbacks','onboardingBimestre'];
  let ok=true;
  for(const field of fields){
    const val=db[field];if(val===undefined)continue;
    try{
      const r=await fetch(`${BASE}/${field}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(val)});
      if(!r.ok){ok=false;console.warn('forceSyncAll fail:',field,r.status);}
    }catch(e){ok=false;}
  }
  try{
    const cleaned=(db.teamTrainings||[]).map(t=>({
      id:t.id||'',title:t.title||'',date:t.date||'',month:t.month||'',
      status:t.status||'',errMode:t.errMode||'',
      caixas:Array.isArray(t.caixas)?t.caixas:[],
      questions:Array.isArray(t.questions)?t.questions:[],
      results:(Array.isArray(t.results)?t.results:[]).map(r=>({
        analista:r.analista||'',email:r.email||'',caixa:r.caixa||'',
        stars:r.stars||0,ac:r.ac||0,er:r.er||0,feedback:r.feedback||'',
        answersArr:(Array.isArray(t.questions)?t.questions:[]).map(q=>r.answers?!!r.answers[q]:null)
      }))
    }));
    const r=await fetch(`${BASE}/teamTrainings.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(cleaned)});
    if(!r.ok)ok=false;
  }catch(e){ok=false;}
  pendingSync=false;
  if(ok){
    syncStatus='ok';lastSyncTime=new Date();
    if(!silent&&el)el.innerHTML='<span style="color:var(--green-text)">✓ Dados enviados! Os outros já podem ver.</span>';
    if(!silent)toast('✓ Sincronizado!');
  } else {
    syncStatus='error';
    if(!silent&&el)el.innerHTML='<span style="color:var(--red-text)">⚠ Erro. Tente novamente.</span>';
  }
  updateSyncBadge();
  return ok;
}

  document.querySelectorAll('.seg button[data-theme]').forEach(b=>b.classList.toggle('on',b.dataset.theme===v));
  // Fecha e reabre o modal para refletir o novo tema
  closeModal();

}

function addMonth(){const m=prompt('Nome do novo mês (ex: Julho 2026):');if(m&&m.trim()&&!db.months.includes(m.trim())){db.months.push(m.trim());db.current=m.trim();persist();render();}}
function dl(csv,name){const blob=new Blob(["\ufeff"+csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);}
function exportCSV(){const rows=[['Tipo','Titulo','Analista/Time','Data','Prioridade','Status','Mes']];inMonth(db.pdis).forEach(p=>rows.push(['PDI',p.title,p.analyst,p.date,p.priority,p.status,p.month]));inMonth(db.actions).forEach(a=>rows.push([a.type,a.title,a.who,a.date,a.priority,a.status,a.month]));inMonth(db.docs).forEach(d=>rows.push(['Documentação',d.title,'',d.month,d.priority,d.status,d.month]));dl(rows.map(r=>r.map(c=>`"${(c==null?'':String(c)).replace(/"/g,'""')}"`).join(',')).join('\n'),`painel-${db.current.replace(' ','-')}.csv`);toast('CSV exportado');}


/* ===== controle de edição por senha ===== */
const EDIT_HASH='5666a050';// hash simples da senha 110819
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return Math.abs(h).toString(16);}
let _editMode=false;
function isEditMode(){return _editMode;}
function setEditMode(on){
  _editMode=on;
  document.body.classList.toggle('editmode',on);
  const btn=document.getElementById('lockBtn');
  if(btn){btn.textContent=on?'🔓':'🔒';btn.title=on?'Clique para bloquear edição':'Clique para editar';}
  if(on)toast('✓ Modo edição ativo');
  else toast('🔒 Modo leitura ativado');
  render();
}
function toggleEditMode(){
  if(_editMode){setEditMode(false);return;}
  const pwd=prompt('🔒 Senha de edição:');
  if(!pwd)return;
  if(simpleHash(pwd)===EDIT_HASH){setEditMode(true);}
  else{toast('Senha incorreta');}
}

applyTheme();
render();
initSync();
// Inicializar cadeado
setTimeout(()=>{const btn=document.getElementById('lockBtn');if(btn)btn.textContent='🔒';},50);
</script>
